name: hrms_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  table_calendar: ^3.1.3
  camera: ^0.10.5
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  permission_handler: ^11.0.0
  image_picker: ^1.1.2
  http: ^1.2.0
  http_parser: ^4.0.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  web_socket_channel: ^3.0.1
  socket_io_client: ^3.0.0
  file_picker: ^8.0.0
  flutter_local_notifications: ^17.1.2
  gal: ^2.3.0
  path_provider: ^2.1.4
  open_file: ^3.3.2
  fl_chart: ^0.69.0
  dio: ^5.4.0
  excel: ^2.1.0
  google_mlkit_face_detection: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/aselea-logo.jpeg

# 🔥 App Icon Configuration
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/aselea-logo.jpeg"
  min_sdk_android: 21
  background_color_ios: "#000000"
  remove_alpha_ios: true
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/aselea-logo.jpeg"
